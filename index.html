<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoleTool - VPM Repository</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0e1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 48px; max-width: 520px; text-align: center; }
    h1 { font-size: 1.6em; margin-bottom: 8px; }
    .version { color: #8b949e; margin-bottom: 24px; }
    .description { color: #8b949e; margin-bottom: 32px; line-height: 1.5; }
    .btn { display: inline-block; background: #238636; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-size: 1.1em; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #2ea043; }
    .manual { margin-top: 24px; color: #8b949e; font-size: 0.85em; }
    .manual code { background: #21262d; padding: 2px 6px; border-radius: 4px; font-size: 0.95em; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MoleTool</h1>
    <p class="version">v1.0.0</p>
    <p class="description"></p>
    <a class="btn" href="vcc://vpm/addRepo?url=https%3A%2F%2Fnfya-lab.github.io%2FMoleTool%2Fvpm.json">VCC に追加</a>
    <p class="manual">または VCC で手動追加:<br><code>https://nfya-lab.github.io/MoleTool/vpm.json</code></p>
  </div>
</body>
</html>
